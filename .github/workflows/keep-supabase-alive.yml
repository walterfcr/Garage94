name: Keep Supabase Alive

on:
  schedule:
    - cron: '0 10 * * 1'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest

    steps:
      - name: Ping Supabase
        run: |
          curl "${{ secrets.SUPABASE_URL }}/rest/v1/products?select=id&limit=1" \
          -H "apikey: ${{ secrets.SUPABASE_KEY }}"
